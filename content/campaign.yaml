dsl_version: "1"
id: ml-journey-v0
title: "Path of the Researcher"
version: "0.2.0"
description: |
  A journey through the mathematical and computational foundations of machine learning.
  Five regions aligned with the real study plan.
  Linear algebra is the root; optimization and ML run in parallel; CV and NLP sit above.

regions:
  - la
  - opt
  - ml
  - cv
  - nlp

world:
  name: "The Shattered Meridian"
  description: |
    A fractured continent where ancient mathematical truths are inscribed in the land itself.
    Five territories, each governed by a different order of knowledge.
    The path between them is long. The reward is understanding.

  nodes:
    - region: la
      world_name: "The Crystalline Vaults"
      description: |
        Deep underground halls carved from perfect blue crystal.
        Linear algebra — the root from which all paths grow.
      x: 5
      y: 30
      color: "#90caf9"

    - region: opt
      world_name: "The Gradient Wastes"
      description: |
        A vast arid plateau where every step is measured.
        EE364A and Caramanis — convexity, duality, first- and second-order methods.
      x: 60
      y: 20
      color: "#ffb74d"

    - region: ml
      world_name: "The Emergent Forests"
      description: |
        A dense forest where patterns grow from noise.
        CS109, CS229, CS229M — probability, learning, generalization.
      x: 60
      y: 65
      color: "#81c784"

    - region: cv
      world_name: "The Seeing Peaks"
      description: |
        High ridges above the cloud line.
        CS198-126 — architectures, detection, generative vision, multimodal.
      x: 85
      y: 80
      color: "#ce93d8"

    - region: nlp
      world_name: "The Scriptoria"
      description: |
        Ancient halls of language and meaning.
        NLP & LLM — the upper block (content coming soon).
      x: 35
      y: 12
      color: "#f48fb1"

  edges:
    - from: la
      to: opt
    - from: la
      to: ml
    - from: ml
      to: cv
    - from: opt
      to: nlp
    - from: ml
      to: nlp

